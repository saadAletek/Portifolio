<div class="py-28 max-h-custom min-h-custom">   
    <div class="container mx-auto px-3 flex flex-col items-center">
        <div class="common-headers text-primary text-4xl font-black">
            <p>Contact me</p>
            <div></div>
        </div>
        <div class="grid xl:grid-cols-3 grid-cols-1 gap-32 mt-12 text-xl w-full ">
            <div class="flex flex-col gap-5 xl:col-span-2">
                <div>
                    <label class="pl-1 w-min cursor-text duration-200" for="name" #name>
                        <span class="relative top-[38px] duration-200">N</span>
                        <span class="relative top-[38px] duration-200">a</span>
                        <span class="relative top-[38px] duration-200">m</span>
                        <span class="relative top-[38px] duration-200">e</span>
                        <span class="relative top-[38px] duration-200">:</span>
                    </label>
                    <input class="w-full bg-transparent border-b border-white  rounded-sm px-2 py-2 mt-1 text-base focus:outline-none" id="name" (focus)="onFocus(this.name)" (blur)="onBlur(this.name)">
                </div>
                <div>
                    <label class="pl-1 w-min cursor-text duration-200" for="email" #email>
                        <span class="relative top-[38px] duration-200">E</span>
                        <span class="relative top-[38px] duration-200">m</span>
                        <span class="relative top-[38px] duration-200">a</span>
                        <span class="relative top-[38px] duration-200">i</span>
                        <span class="relative top-[38px] duration-200">l</span>
                        <span class="relative top-[38px] duration-200">:</span>
                    </label>
                    <input class="w-full bg-transparent border-b border-white rounded-sm px-2 py-2 mt-1 text-base focus:outline-none" id="email" (focus)="onFocus(this.email)" (blur)="onBlur(this.email)">
                </div>
                <div>
                    <label class="pl-1 w-min cursor-text duration-200" for="msg" #msg>
                        <span class="relative top-[38px] duration-200">M</span>
                        <span class="relative top-[38px] duration-200">e</span>
                        <span class="relative top-[38px] duration-200">s</span>
                        <span class="relative top-[38px] duration-200">s</span>
                        <span class="relative top-[38px] duration-200">a</span>
                        <span class="relative top-[38px] duration-200">g</span>
                        <span class="relative top-[38px] duration-200">e</span>
                        <span class="relative top-[38px] duration-200">:</span>

                    </label>
                    <textarea class="w-full bg-transparent border-b border-white rounded-sm px-2 py-2 resize-none mt-1 text-base focus:outline-none" rows="3" id="msg" (focus)="onFocus(this.msg)" (blur)="onBlur(this.msg)"></textarea>
                </div>
                <div (click)="toggleMenu()" class="bg-primary px-5 py-2 xl:w-min text-center rounded-md mt-[24px] cursor-pointer duration-200 hover:bg-lighterPrimary hover:scale-105 text-white">
                    Send
                </div>
            </div>
            <div class="shadow-2xl inset-1 grid grid-rows-5 p-3 gap-4 text-base font-bold">
                <a [href]="'mailto:' + personalData.gmail" target="_blank"  class="flex items-center gap-4 duration-200 hover:brightness-125 px-5 py-2 rounded-md bg-backgroundC cursor-pointer border-b border-main-black hover:shadow-xl hover:-translate-y-1">
                    <img class="w-5" src="images/mail_c.svg">
                    <span>{{personalData.gmail}}</span>
                </a>
                <a [href]="'tel:' + personalData.phone" target="_blank"  class="flex items-center gap-4 duration-200 hover:brightness-125 px-5 py-2 rounded-md bg-backgroundC cursor-pointer border-b border-main-black hover:shadow-xl hover:-translate-y-1">
                    <img class="w-5" src="images/phone_c.svg">
                    <span>{{personalData.phone}}</span>
                </a>
                <a [href]="'https://x.com/' + personalData.twitter" target="_blank"  class="flex items-center gap-4 duration-200 hover:brightness-125 px-5 py-2 rounded-md bg-backgroundC cursor-pointer border-b border-main-black hover:shadow-xl hover:-translate-y-1">
                    <img class="w-5" src="images/x_c.svg">
                    <span>{{personalData.twitter}}</span>
                </a>
                <a [href]="'https://github.com/' + personalData.github" target="_blank"  class="flex items-center gap-4 duration-200 hover:brightness-125 px-5 py-2 rounded-md bg-backgroundC cursor-pointer border-b border-main-black hover:shadow-xl hover:-translate-y-1">
                    <img class="w-5" src="images/github_c.svg">
                    <span>{{personalData.github}}</span>
                </a>
                <a [href]="'https://linkedin.com/in/' + personalData.linkedin" target="_blank"  class="flex items-center gap-4 duration-200 hover:brightness-125 px-5 py-2 rounded-md bg-backgroundC cursor-pointer border-b border-main-black hover:shadow-xl hover:-translate-y-1">
                    <img class="w-5" src="images/linkedin.svg">
                    <span>saad aletek</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="w-full h-screen fixed top-0 z-50 items-center justify-center opacity-0 transition-opacity" [ngStyle]="{ 'display': CurrencyMenuOpen ? 'flex' : 'none', 'opacity': MenuTran ? '100%' : '0%'}">
    <div class="bg-[#00000080] w-full h-screen fixed z-48" (click)="toggleMenu()"></div>
    <div class="text-darkerPrimary shadow-2xl MenuTransition relative z-49 bg-white rounded-sm text-2xl flex flex-col justify-center items-center gap-10 font-medium     2xl:w-[25vw] xl:w-[30vw] lg:w-[40vw] lg:p-8 sm:w-[60vw] sm:h-fit sm:p-6 w-full h-full p-3"  
    [ngStyle]="{ 'transform': MenuTran ? 'translateY(0)' : 'translateY(100vh)'}">
        <div>
            <img src="images/successTick.svg">
        </div>
        <div class="text-center">
            Your Message has been sent.
        </div>
        <div>
            <div class="rounded-md bg-primary px-6 py-2 text-white duration-200 hover:bg-lighterPrimary cursor-pointer" (click)="toggleMenu()">Ok</div>
        </div>
    </div>
</div>
