<div class="min-h-screen relative flex items-center pt-36">
    <div  class="global-container mx-auto h-full flex items-center justify-between relative">
        <div class="relative z-10">
            <div class="2xl:text-6xl xl:text-5xl lg:text-4xl text-3xl lg:mb-20 mb-10">
                <p>Hi I'm a</p>
                <p class="text-primary duration-300 hover:text-lighterPrimary cursor-pointer font-bold">Frontend
                    Developer</p>
                <p>Living in <span
                        class="text-primary duration-300 hover:text-lighterPrimary cursor-pointer font-bold">Turkey</span>
                </p>
            </div>
            <div [routerLink]="'about-me'"
                class="flex items-center gap-3 duration-200 incGapAnimation cursor-pointer text-primary hover:text-lighterPrimary  lg:text-3xl text-sm">
                <div class="font-medium">More About me</div>
                <div class="">
                    <img alt="arrow-left" class="w-6" src="images/arrowLeft.svg">
                </div>
            </div>
        </div>

        <div class="md:relative md:right-auto right-0 md:filter-none grayscale absolute z-0 xl:p-0 p-3">
            <img class="xl:w-[400px] lg:w-[300px] w-[200px] z-20 duration-200 hover:scale-105 glowing-effect rounded-full"
                [src]="LandingImage">
        </div>
    </div>
    <div class="absolute bottom-10 right-1/2 translate-x-1/2 lg:block hidden onlightBrightness">
        <svg width="20px" height="100%" viewBox="0 0 247 390" version="1.1" xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
            <path id="wheel" d="M123.359,79.775l0,72.843" style="fill:none;stroke:#fff;stroke-width:20px;" />
            <path id="mouse"
                d="M236.717,123.359c0,-62.565 -50.794,-113.359 -113.358,-113.359c-62.565,0 -113.359,50.794 -113.359,113.359l0,143.237c0,62.565 50.794,113.359 113.359,113.359c62.564,0 113.358,-50.794 113.358,-113.359l0,-143.237Z"
                style="fill:none;stroke:#fff;stroke-width:20px;" />
        </svg>
    </div>
</div>

<!-- My Skills -->
<div class="py-28 bg-sectionSeperator">
    <div class="global-container mx-auto grid xl:grid-cols-2 grid-cols-1 gap-20">
        <div class="flex flex-col items-center">
            <div class="common-headers text-primary text-4xl">
                <p>My Skills</p>
                <div></div>
            </div>
                <div class="grid md:grid-cols-4 grid-cols-2 gap-16 mt-20">
                    @for(skill of skillArray ; track skill){  
                    <div class="relative bg-darkerPrimary/20 flex justify-center p-3 aspect-square rounded-md overflow-hidden group">
                        <img class="flex h-min w-20 group-hover:w-12 group-hover:top-0 group-hover:translate-y-0 relative top-1/2 -translate-y-1/2 duration-200 z-50" [src]="skill.image">
                        <div class="absolute bottom-[-105%] group-hover:bottom-0  w-full h-full flex items-end justify-center duration-200">
                            <div class="relative z-50 mb-2 text-center">
                                <div class="text-base font-normal text-lighterPrimary mb-1">{{skill.name}}</div>
                            </div>
                        </div>
                    </div>                        
                    }
                </div>
        </div>
        <div class="flex flex-col items-center">
            <div class="common-headers text-primary text-4xl">
                <p>My Languages</p>
                <div></div>
            </div>
            <div class="grid md:grid-cols-3 grid-cols-2 gap-16 mt-20">
                    @for(lang of langsArr ; track lang){  
                    <div class="relative bg-darkerPrimary/20 flex justify-center p-3 aspect-square rounded-md overflow-hidden group">
                        <img class="flex h-min w-20 group-hover:w-12 group-hover:top-0 group-hover:translate-y-0 relative top-1/2 -translate-y-1/2 duration-200 z-50" [src]="lang.image">
                        <div class="absolute bottom-[-105%] group-hover:bottom-0  w-full h-full flex items-end justify-center duration-200">
                            <div class="relative z-50 mb-2 text-center">
                                <div class="text-base font-normal text-lighterPrimary mb-1">{{lang.name}}</div>
                            </div>
                        </div>
                    </div>                        
                    }
            </div>
        </div>
    </div>
    <div class="w-full flex justify-center">
        <div [routerLink]="'about-me'" class="flex items-center gap-2 duration-200 hover:gap-5 cursor-pointer text-primary hover:brightness-105 mt-20 text-xl">
            <div class="font-">See More</div>
            <div>
                <img loading="lazy" src="images/arrowLeft.svg">
            </div>
        </div>
    </div>
</div>

<!-- My Work -->
<div class="py-28 pb-16">
    <div class="global-container mx-auto flex flex-col items-center">
        <div class="common-headers text-primary text-5xl font-black">
            <p>My Work</p>
            <div></div>
        </div>
        <div class="grid lg:grid-cols-2 grid-cols-1 gap-8 mt-32 w-full text-white">
            @for(work of worksArray; track work){
                <div class="overflow-hidden relative group rounded-md">
                    <img alt="work" loading="lazy" class="w-full" [src]="work.image">
                    <div
                        class="absolute transparent-gradient -bottom-64 group-hover:bottom-0 duration-300 w-full h-64 pb-10 px-5 flex flex-col justify-end">
                        <div class="w-full text-center font-bold mb-4 text-2xl">
                            {{work.name}}
                        </div>
                        <div class="flex justify-center items-center lg:gap-16 gap-5">
                            <a [href]="work.link" target="_blank"
                                class="text-xl border-2 font-semibold border-white w-full max-w-32 text-center py-1 rounded-md cursor-pointer duration-200 hover:border-lighterPrimary hover:text-lighterPrimary">
                                Visit
                            </a>
                            <!-- <div [routerLink]="'/my-works/' + work.id"
                                class="text-xl  border-2 font-semibold border-white w-full max-w-32 text-center py-1 rounded-md cursor-pointer duration-200 hover:border-lighterPrimary hover:text-lighterPrimary">
                                Details
                            </div> -->
                        </div>
                    </div>
                </div>
            }
        </div>
        <div [routerLink]="'my-works'"
            class="flex items-center gap-2 duration-200 hover:gap-5 cursor-pointer text-primary hover:brightness-105 mt-20 text-xl">
            <div class="font-">See More</div>
            <div>
                <img loading="lazy" src="images/arrowLeft.svg">
            </div>
        </div>
    </div>
</div>
